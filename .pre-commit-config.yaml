repos:
  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        name: Check YAML
        args: ['--unsafe']
      - id: check-toml
        name: Check TOML
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: end-of-file-fixer
        name: Fix end of file
      - id: trailing-whitespace
        name: Trim trailing whitespace

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline', '--allow-missing-credentials']

  # CHANGELOG check
  - repo: local
    hooks:
      - id: changelog-updated
        name: Check CHANGELOG updated
        # Pass if CHANGELOG.md is staged; warn (non-blocking) otherwise.
        entry: bash -c 'git diff --cached --name-only | grep -qx CHANGELOG.md || echo "[warning] CHANGELOG.md was not updated in this commit"'
        language: system
        stages: [commit]
        pass_filenames: false
        always_run: true
