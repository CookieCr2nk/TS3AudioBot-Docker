services:
  ts3audiobot:
    image: ghcr.io/cookiecr2nk/ts3audiobot-docker:master
    container_name: ts3audiobot
    restart: unless-stopped
    ports:
      - "58913:58913"
    volumes:
      - ts3audiobot-data:/data
    tmpfs:
      - /tmp:mode=1777,size=64m
    # SOC2 Security Hardenings
    read_only: true         # Prevent writes to root filesystem
    cap_drop:
      - ALL                 # Drop all Linux capabilities to prevent privilege escalation
    security_opt:
      - no-new-privileges:true # Ensure child processes cannot gain new privileges
    pids_limit: 100
    # PCI-DSS Logging (Requirement 10) - Configure your SIEM/log aggregator address
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ts3audiobot"
    # Uncomment to use syslog for centralized logging:
    # logging:
    #   driver: syslog
    #   options:
    #     syslog-address: "tcp://192.168.1.100:514"
    #     tag: "ts3audiobot-audit"

volumes:
  ts3audiobot-data:
